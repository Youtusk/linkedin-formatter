<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Text Formatter - Bold, Italic, Underline</title>
    <meta name="description" content="100% free tool to format your LinkedIn posts. Add bold, italic and underline to make your professional posts stand out.">
    <meta name="keywords" content="linkedin formatter, bold text linkedin, write bold on linkedin, italic linkedin, unicode linkedin, perfect linkedin post">
    <meta property="og:title" content="LinkedIn Pro Text Formatter">
    <meta property="og:description" content="Create eye-catching LinkedIn posts with bold and italic text. Free and instant.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide@latest/css/lucide.css" rel="stylesheet">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-88QE1YY0LD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-88QE1YY0LD');
    </script>
</head>
<body>
    <nav class="empire-nav">
        <span>Discover also:</span>
        <a href="../yt-thumbnail-grabber/index.html" class="empire-link">YouTube Pro Extractor</a>
    </nav>

    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>LinkedIn <span>Pro Formatter</span></h1>
            <p>Write. Format. Impress.</p>
        </header>

        <div class="editor-panel">
            <div class="toolbar">
                <button id="btn-bold" class="tool-btn" title="Bold (Ctrl+B)">
                    <i data-lucide="bold"></i>
                </button>
                <button id="btn-italic" class="tool-btn" title="Italic (Ctrl+I)">
                    <i data-lucide="italic"></i>
                </button>
                <button id="btn-underline" class="tool-btn" title="Underline (Ctrl+U)">
                    <i data-lucide="underline"></i>
                </button>
                <button id="btn-strikethrough" class="tool-btn" title="Strikethrough">
                    <i data-lucide="strikethrough"></i>
                </button>
                <div class="divider"></div>
                <button id="btn-clear" class="tool-btn danger" title="Clear All">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>

            <textarea id="editor" placeholder="Start typing your perfect post here... Select text and use the buttons to format it."></textarea>
            
            <div class="status-bar">
                <div class="counters">
                    <span id="char-count">0 characters</span>
                    <span class="dot">•</span>
                    <span id="word-count">0 words</span>
                </div>
                <div class="limits" id="limit-warning">
                    Ideal for LinkedIn (Max 3000)
                </div>
            </div>
        </div>

        <button id="btn-copy" class="action-btn">
            <i data-lucide="copy"></i>
            <span>Copy for LinkedIn</span>
        </button>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <script src="script.js"></script>
</body>
</html>
